<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Resume Builder</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Resume Builder Pro</h1>
            <div class="template-selector">
                <span>เลือกเทมเพลต: </span>
                <button onclick="changeTemplate('modern')" class="btn-sm">Modern Blue</button>
                <button onclick="changeTemplate('classic')" class="btn-sm">Classic Dark</button>
            </div>
        </header>

        <section class="editor-side">
            <div class="card">
                <h3>👤 ข้อมูลส่วนตัว</h3>
                <input type="text" id="inName" placeholder="ชื่อ-นามสกุล" oninput="updatePreview()">
                <input type="text" id="inRole" placeholder="ตำแหน่งงาน" oninput="updatePreview()">
                <input type="text" id="inContact" placeholder="อีเมล | เบอร์โทร | ที่อยู่" oninput="updatePreview()">
            </div>

            <div class="card">
                <h3>💼 ประสบการณ์ทำงาน</h3>
                <div id="exp-list">
                    <div class="exp-item">
                        <input type="text" class="inYear" placeholder="ปีที่ทำ (เช่น 2024 - ปัจจุบัน)" oninput="updatePreview()">
                        <textarea class="inDetail" placeholder="รายละเอียดงานและชื่อบริษัท" oninput="updatePreview()"></textarea>
                    </div>
                </div>
                <button onclick="addExperience()" class="btn-add">+ เพิ่มประสบการณ์</button>
            </div>

            <div class="card">
                <h3>🛠 ทักษะ (แยกด้วยคอมม่า ,)</h3>
                <input type="text" id="inSkills" placeholder="เช่น Photoshop, Excel, งานช่าง" oninput="updatePreview()">
            </div>

            <button class="btn-download" onclick="exportPDF()">ดาวน์โหลด PDF</button>
        </section>

        <div id="resume-to-print" class="resume-paper modern">
            <div class="resume-header">
                <h1 id="outName">ชื่อ-นามสกุล</h1>
                <p id="outRole" class="sub-title">ตำแหน่งงาน</p>
                <p id="outContact" class="contact-text">contact@mail.com | 08x-xxx-xxxx</p>
            </div>
            
            <div class="resume-body">
                <div class="section-title">ประสบการณ์การทำงาน</div>
                <div id="outExpList"></div>

                <div class="section-title">ทักษะและความสามารถ</div>
                <div id="outSkills" class="skills-tags"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
